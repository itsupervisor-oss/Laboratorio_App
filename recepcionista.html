<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Plexus - Recepción</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Montserrat', sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; color: #333; }
        
        .header {
            display: flex; justify-content: space-between; align-items: center; 
            background: linear-gradient(90deg, #001f4d 0%, #003366 100%); 
            color: white; padding: 20px 30px; border-radius: 10px; margin-bottom: 20px;
        }
        .header h1 { margin: 0; font-size: 1.8rem; color: #ffff00; }
        .header p { margin: 5px 0 0 0; font-size: 1rem; opacity: 0.9; }
        
        .btn-refresh {
            background: #ffff00; color: #001f4d; border: none; padding: 12px 24px; 
            border-radius: 8px; font-weight: bold; cursor: pointer;
        }

        .contenedor-principal {
            display: flex;
            gap: 20px;
            align-items: flex-start;
        }

        .columna-resumen {
            flex: 0 0 250px;
            position: sticky;
            top: 20px;
        }

        .columna-tabla {
            flex: 1;
        }
        
        .card-conteo {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.05);
        }

        .card-conteo h3 { margin-top: 0; color: #001f4d; border-bottom: 2px solid #f4f7f6; padding-bottom: 10px; }

        .fila-conteo {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #eee;
            font-weight: 600;
        }

        table { width: 100%; border-collapse: collapse; background: white; border-radius: 10px; overflow: hidden; box-shadow: 0 4px 8px rgba(0,0,0,0.05); }
        thead { background: #001f4d; color: white; text-align: left; }
        th, td { padding: 15px 20px; border-bottom: 1px solid #ddd; }
        
        /* Estilos de Badges */
        .badge-esperando { background: #ffcc00; color: #856600; padding: 6px 12px; border-radius: 20px; font-weight: bold; font-size: 0.85rem;}
        .badge-llamado { background: #17a2b8; color: white; padding: 6px 12px; border-radius: 20px; font-weight: bold; font-size: 0.85rem;}
        .badge-registrado { background: #9c27b0; color: white; padding: 6px 12px; border-radius: 20px; font-weight: bold; font-size: 0.85rem;}
        .badge-derivado { background: #ff9800; color: white; padding: 6px 12px; border-radius: 20px; font-weight: bold; font-size: 0.85rem;}
        .badge-finalizado { background: #28a745; color: white; padding: 6px 12px; border-radius: 20px; font-weight: bold; font-size: 0.85rem;}
        
        /* Botones */
        .btn-llamar { background: #17a2b8; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .btn-atender { background: #28a745; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .btn-disabled { background: #ccc; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: not-allowed; font-weight: bold; }
        
        #pantalla-error { display: none; text-align: center; margin-top: 100px; color: red; }
    </style>
</head>
<body>

    <div id="pantalla-error">
        <h1>⚠️ ACCESO DENEGADO</h1>
        <p>Este equipo no tiene configurada una Sucursal.</p>
    </div>

    <div id="main-dashboard">
        <div class="header">
            <div>
                <h1>Recepción - Control de Sala</h1>
                <p id="info-sucursal">Cargando ubicación...</p>
            </div>
            <button class="btn-refresh" onclick="cargarTurnos()">↻ Actualizar Lista</button>
        </div>

        <div class="contenedor-principal">
            <div class="columna-resumen">
                <div class="card-conteo">
                    <h3>Estado de Sala</h3>
                    <div class="fila-conteo">
                        <span>Total Hoy:</span>
                        <span id="cnt-total" style="color: #001f4d;">0</span>
                    </div>
                    <div class="fila-conteo">
                        <span style="color: #856600;">🕒 Esperando:</span>
                        <span id="cnt-espera">0</span>
                    </div>
                    <div class="fila-conteo">
                        <span style="color: #17a2b8;">📞 En Recepción:</span>
                        <span id="cnt-atencion">0</span>
                    </div>
                    <div class="fila-conteo">
                        <span style="color: #9c27b0;">📝 Registrados:</span>
                        <span id="cnt-registrados">0</span>
                    </div>
                    <div class="fila-conteo">
                        <span style="color: #ff9800;">🧪 En Muestreo:</span>
                        <span id="cnt-muestreo">0</span>
                    </div>
                    <div class="fila-conteo">
                        <span style="color: #28a745;">✅ Finalizados:</span>
                        <span id="cnt-finalizados">0</span>
                    </div>
                </div>
            </div>

            <div class="columna-tabla">
                <table>
                    <thead>
                        <tr>
                            <th>Ticket</th>
                            <th>Paciente</th>
                            <th>Tipo</th>
                            <th>Servicio</th>
                            <th>Estado</th>
                            <th>Acción</th>
                        </tr>
                    </thead>
                    <tbody id="tabla-turnos">
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const parametrosURL = new URLSearchParams(window.location.search);
        const ciudadActiva = parametrosURL.get('ciudad');
        const sucursalActiva = parametrosURL.get('sucursal');

        if (!ciudadActiva || !sucursalActiva) {
            document.getElementById('main-dashboard').style.display = 'none';
            document.getElementById('pantalla-error').style.display = 'block';
        } else {
            document.getElementById('info-sucursal').innerText = `Ciudad: ${ciudadActiva} | Sucursal: ${sucursalActiva}`;
            cargarTurnos();
        }

        async function cargarTurnos() {
            try {
                const respuesta = await fetch(`http://localhost:8000/turnos?ciudad=${ciudadActiva}&sucursal=${sucursalActiva}`);
                const turnos = await respuesta.json();
                
                let total = turnos.length;
                let esperando = 0;
                let atencion = 0;    // Ahora solo contará los 'Llamado'
                let registrados = 0; // 🟢 Nuevo contador para 'Registrado'
                let muestreo = 0;
                let finalizados = 0;

                const tbody = document.getElementById('tabla-turnos');
                tbody.innerHTML = ''; 

                turnos.forEach(turno => {
                    // Contamos los estados
                    if (turno.estado === 'Esperando') esperando++;
                    else if (turno.estado === 'Llamado') atencion++;    // 🔵 Solo llamados
                    else if (turno.estado === 'Registrado') registrados++; // 🟢 Solo registrados
                    else if (turno.estado === 'Derivado') muestreo++;
                    else if (turno.estado === 'Finalizado') finalizados++;

                    const tr = document.createElement('tr');
                    let badgeEstado = '';
                    let botonesAccion = '';

                    // Lógica del flujo de 4 pasos
                    if (turno.estado === 'Esperando') {
                        badgeEstado = `<span class="badge-esperando">Esperando</span>`;
                        botonesAccion = `<button class="btn-llamar" onclick="cambiarEstado(${turno.id}, 'Llamado')">Llamar</button>`;
                    } 
                    else if (turno.estado === 'Llamado') {
                        badgeEstado = `<span class="badge-llamado">Llamado</span>`;
                        botonesAccion = `<button style="background-color: #9c27b0; color: white; padding: 8px 15px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold;" onclick="cambiarEstado(${turno.id}, 'Registrado')">Registrar</button>`;
                    } 
                    else if (turno.estado === 'Registrado') {
                        badgeEstado = `<span class="badge-registrado">Registrado</span>`;
                        botonesAccion = `<button style="background-color: #ff9800; color: white; padding: 8px 15px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold;" onclick="cambiarEstado(${turno.id}, 'Derivado')">Derivar a Muestra</button>`;
                    }
                    else if (turno.estado === 'Derivado') {
                        badgeEstado = `<span class="badge-derivado">En Muestreo</span>`;
                        botonesAccion = `<button class="btn-atender" onclick="cambiarEstado(${turno.id}, 'Finalizado')">Finalizar</button>`;
                    }
                    else {
                        badgeEstado = `<span class="badge-finalizado">Finalizado</span>`;
                        botonesAccion = `<button class="btn-disabled" disabled>Completado</button>`;
                    }

                    let badgeTipo = turno.tipo === 'Preferencial' ? 
                        '<span style="background-color: #ff9800; color: white; padding: 4px 10px; border-radius: 12px; font-size: 0.85rem; font-weight: bold;">⭐ Preferencial</span>' : 
                        '<span style="color: #555; font-weight: 500;">Regular</span>';

                    tr.innerHTML = `
                        <td><strong>#${turno.id}</strong></td>
                        <td>${turno.paciente}</td>
                        <td>${badgeTipo}</td> 
                        <td>${turno.servicio}</td>
                        <td>${badgeEstado}</td>
                        <td>${botonesAccion}</td>
                    `;
                    tbody.appendChild(tr);
                });

                // Actualizar contadores
                document.getElementById('cnt-total').innerText = turnos.length;
                document.getElementById('cnt-espera').innerText = esperando;
                document.getElementById('cnt-atencion').innerText = atencion;
                document.getElementById('cnt-registrados').innerText = registrados; // 🟢 Mostrar nuevo conteo
                document.getElementById('cnt-muestreo').innerText = muestreo;
                document.getElementById('cnt-finalizados').innerText = finalizados;

            } catch (error) {
                console.error("Error cargando turnos:", error);
            }
        }

        async function cambiarEstado(idTurno, nuevoEstado) {
            try {
                // El backend grabará la hora correspondiente según el estado
                const respuesta = await fetch(`http://localhost:8000/turnos/${idTurno}?nuevo_estado=${nuevoEstado}`, { method: 'PUT' });
                if(respuesta.ok) cargarTurnos();
            } catch (error) {
                alert("Error de conexión con el servidor.");
            }
        }

        // Actualización automática cada 20 segundos
        setInterval(cargarTurnos, 20000);
    </script>
</body>
</html>
