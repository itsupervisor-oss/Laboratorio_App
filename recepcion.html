<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plexus - Registro</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        /* --- ESTILOS VISUALES --- */
        body {
            margin: 0; padding: 0; display: flex; justify-content: center; align-items: center;
            height: 100vh; background: linear-gradient(180deg, #001f4d 0%, #003366 100%);
            font-family: 'Montserrat', sans-serif; overflow: hidden;
        }
        .main-container {
            width: 100%; max-width: 600px; padding: 30px; text-align: center;
            display: flex; flex-direction: column; align-items: center; height: 80vh; justify-content: space-around;
        }
        .title { color: #ffff00; font-weight: 700; font-size: 3rem; margin: 0; }
        .subtitle { color: #ffff00; font-weight: 600; font-size: 1.5rem; margin: 0; }
        
        .input-box {
            width: 80%; padding: 20px; background: rgba(0, 0, 0, 0.4); border: 2px solid rgba(255, 255, 255, 0.5);
            border-radius: 15px; color: white; font-size: 1.3rem; text-align: center;
            font-family: 'Montserrat', sans-serif; outline: none; transition: all 0.3s ease;
        }
        .input-box:focus { border-color: #ffff00; box-shadow: 0 0 10px rgba(255, 255, 0, 0.5); }
        
        .options-container { width: 80%; display: flex; flex-direction: column; gap: 20px; margin-top: 20px;}
        .option-row { display: flex; align-items: center; gap: 20px; cursor: pointer; transition: transform 0.2s ease; }
        .option-row:hover { transform: scale(1.02); }
        
        .icon-circle {
            width: 70px; height: 70px; border: 3px solid #ffff00; border-radius: 50%;
            display: flex; justify-content: center; align-items: center; flex-shrink: 0;
        }
        .icon-circle svg { width: 35px; height: 35px; fill: #ffff00; }
        
        .glass-button {
            flex-grow: 1; padding: 25px; background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(5px);
            border: 3px solid rgba(255, 255, 255, 0.8); border-radius: 15px; color: white;
            font-size: 1.5rem; font-weight: 600; text-align: center; user-select: none;
        }

        .plexus-logo { color: white; font-size: 3rem; font-weight: 700; position: absolute; bottom: 40px; letter-spacing: 2px; }
        .logo-subtitle { font-weight: 400; font-size: 1rem; display: block; opacity: 0.8; margin-top: -5px; }

        /* NUEVO: Esta clase es la que hará la magia de ocultar/mostrar pantallas */
        .oculto { display: none !important; }

        /* Botón de volver atrás */
        .btn-volver {
            color: white; text-decoration: underline; cursor: pointer; margin-top: 20px; font-size: 1.2rem; opacity: 0.8;
        }
    </style>
</head>
<body>

    <div class="main-container">
        
        <div id="pantalla-1" style="width: 100%; display: flex; flex-direction: column; align-items: center; gap: 20px;">
            <h1 class="title">Registra tu nombre</h1>
            <input type="text" id="nombreInput" class="input-box" placeholder="Ingrese su nombre" required>
            
            <h2 class="subtitle" style="margin-top: 20px;">Selecciona un tipo de atención</h2>
            <div class="options-container">
                <div class="option-row" onclick="avanzarPaso2('Normal')">
                    <div class="icon-circle"><svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg></div>
                    <div class="glass-button">Normal</div>
                </div>
                <div class="option-row" onclick="avanzarPaso2('Preferencial')">
                    <div class="icon-circle"><svg viewBox="0 0 24 24"><path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zm4.24 16L12 15.45 7.77 18l1.12-4.81-3.73-3.23 4.92-.42L12 5l1.92 4.53 4.92.42-3.73 3.23L16.23 18z"/></svg></div>
                    <div class="glass-button">Preferencial</div>
                </div>
            </div>
        </div>

        <div id="pantalla-2" class="oculto" style="width: 100%; display: flex; flex-direction: column; align-items: center; gap: 20px;">
            <h1 class="title">¿Qué necesitas?</h1>
            <h2 class="subtitle" id="saludoPaciente" style="margin-bottom: 20px;"></h2>
            
            <div class="options-container">
                <div class="option-row" onclick="enviarTurnoFinal('Análisis')">
                    <div class="icon-circle">🔬</div> <div class="glass-button">Análisis de Laboratorio</div>
                </div>
                <div class="option-row" onclick="enviarTurnoFinal('Muestra Pendiente')">
                    <div class="icon-circle">🧪</div>
                    <div class="glass-button">Muestra Pendiente</div>
                </div>
                <div class="option-row" onclick="enviarTurnoFinal('Consulta')">
                    <div class="icon-circle">🩺</div>
                    <div class="glass-button">Consulta Médica</div>
                </div>
            </div>

            <div class="btn-volver" onclick="volverPaso1()">← Volver atrás</div>
        </div><div id="pantalla-exito" class="oculto" style="width: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; margin-top: 40px;">
            <h1 style="color: #28a745; font-size: 3rem; margin-bottom: 10px;">¡Gracias!</h1>
            <p style="font-size: 1.5rem; color: #ffffff; text-align: center; max-width: 80%;">
                Por favor tome asiento, enseguida el personal le llamará por su nombre para atenderlo.
            </p>
        </div>
    </div>

    <div class="plexus-logo">
        plexus
        <span class="logo-subtitle">medicina diagnóstica</span>
    </div>

    <script>
        // 1. LEER LA URL: Buscamos los parámetros ocultos
        const parametrosURL = new URLSearchParams(window.location.search);
        const ciudadConfigurada = parametrosURL.get('ciudad');
        const sucursalConfigurada = parametrosURL.get('sucursal');

        // 2. SEGURIDAD: Si la tablet no está configurada, lanzamos una alerta
        if (!ciudadConfigurada || !sucursalConfigurada) {
            alert("⚠️ ERROR DE CONFIGURACIÓN:\nEsta tablet no tiene asignada una ciudad o sucursal.\nPor favor, contacte a sistemas.");
            // Ocultamos todo para que no puedan usarla mal
            document.querySelector('.main-container').style.display = 'none';
        } else {
            console.log("Tablet configurada para:", ciudadConfigurada, "-", sucursalConfigurada);
        }

        let tipoAtencionGuardado = "";

        function avanzarPaso2(tipoAtencion) {
            const nombre = document.getElementById('nombreInput').value;
            if (!nombre || nombre.trim() === "") {
                alert("Por favor, ingrese su nombre primero.");
                return;
            }
            tipoAtencionGuardado = tipoAtencion;
            document.getElementById('saludoPaciente').innerText = "Hola " + nombre.split(' ') + ", selecciona tu servicio:";
            document.getElementById('pantalla-1').classList.add('oculto');
            document.getElementById('pantalla-2').classList.remove('oculto');
        }

        function volverPaso1() {
            document.getElementById('pantalla-2').classList.add('oculto');
            document.getElementById('pantalla-1').classList.remove('oculto');
        }

        async function enviarTurnoFinal(tipoServicio) {
            const nombreFinal = document.getElementById('nombreInput').value;

            const datos = {
                ciudad: ciudadConfigurada,
                sucursal: sucursalConfigurada,
                nombre_paciente: nombreFinal,
                tipo_paciente: tipoAtencionGuardado,
                tipo_servicio: tipoServicio
            };

            try {
                const respuesta = await fetch('http://192.168.100.19:8000/turnos', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(datos)
                });

                if (respuesta.ok) {
                    // 1. Quitamos el alert() feo
                    // 2. Ocultamos la pantalla de botones y mostramos el mensaje amable
                    document.getElementById('pantalla-2').classList.add('oculto');
                    document.getElementById('pantalla-exito').classList.remove('oculto');

                    // 3. Temporizador: Esperamos 4 segundos (4000 milisegundos) y reiniciamos
                    setTimeout(() => {
                        document.getElementById('pantalla-exito').classList.add('oculto');
                        document.getElementById('nombreInput').value = ""; // Limpiamos el nombre
                        volverPaso1(); // Volvemos a la pantalla principal
                    }, 5000); 

                } else {
                    alert("Hubo un error técnico al registrar su turno.");
                }
            } catch (error) {
                alert("No se pudo conectar con el servidor central.");
            }
        }
    </script>
</body>
</html>
