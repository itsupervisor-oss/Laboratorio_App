<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Plexus BI - Dirección General</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Montserrat', sans-serif; background-color: #eef2f5; margin: 0; padding: 20px; color: #333; }
        
        .header {
            display: flex; justify-content: space-between; align-items: center; 
            background: linear-gradient(90deg, #1a2a6c, #11998e, #38ef7d); 
            color: white; padding: 20px 30px; border-radius: 10px; margin-bottom: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
        .header h1 { margin: 0; font-size: 2rem; color: #fff; text-shadow: 1px 1px 2px rgba(0,0,0,0.5); }
        .header p { margin: 5px 0 0 0; font-size: 1.1rem; opacity: 0.9; }
        
        .btn-refresh {
            background: white; color: #1a2a6c; border: none; padding: 12px 24px; 
            border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.2s;
        }
        .btn-refresh:hover { background: #f0f0f0; transform: scale(1.05); }

        .dashboard-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 20px;
        }

        .card {
            background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.05);
            display: flex; flex-direction: column; align-items: center;
        }
        .card h2 { margin-top: 0; color: #001f4d; font-size: 1.3rem; }
        .chart-container { position: relative; width: 100%; height: 300px; }
    </style>
</head>
<body>

    <div class="header">
        <div>
            <h1>Plexus BI - Panel Gerencial</h1>
            <p>Visión global en tiempo real</p>
        </div>
        <button class="btn-refresh" onclick="cargarEstadisticas()">↻ Actualizar Datos</button>
    </div>
    <div style="background: white; padding: 15px; border-radius: 10px; margin-bottom: 20px; box-shadow: 0 4px 8px rgba(0,0,0,0.05); display: flex; gap: 15px; align-items: center; justify-content: center; flex-wrap: wrap;">
        <label style="font-weight: 600;">Desde: <input type="date" id="fechaInicio" style="padding: 5px; border-radius: 5px; border: 1px solid #ccc;"></label>
        <label style="font-weight: 600;">Hasta: <input type="date" id="fechaFin" style="padding: 5px; border-radius: 5px; border: 1px solid #ccc;"></label>
        
        <button onclick="cargarEstadisticas()" style="background: #11998e; color: white; border: none; padding: 8px 15px; border-radius: 5px; font-weight: bold; cursor: pointer;">🔍 Filtrar</button>
        <button onclick="filtrarHoy()" style="background: #36A2EB; color: white; border: none; padding: 8px 15px; border-radius: 5px; font-weight: bold; cursor: pointer;">📅 Solo Hoy</button>
        <button onclick="filtrarTodo()" style="background: #6c757d; color: white; border: none; padding: 8px 15px; border-radius: 5px; font-weight: bold; cursor: pointer;">📚 Histórico Completo</button>
    </div>
    <div class="dashboard-grid">
        <div class="card">
            <h2>Pacientes por Sucursal</h2>
            <div class="chart-container">
                <canvas id="graficoPacientes"></canvas>
            </div>
        </div>

        <div class="card">
            <h2>Promedio de Satisfacción</h2>
            <div class="chart-container">
                <canvas id="graficoSatisfaccion"></canvas>
            </div>
        </div>

        <div class="card">
            <h2>Tiempo Promedio de Registro (Minutos)</h2>
            <div class="chart-container">
                <canvas id="graficoEficiencia"></canvas>
            </div>
        </div>
    </div>

    <script>
        // Variables globales para los gráficos
        let chartPacientes = null;
        let chartSatisfaccion = null;
        let chartEficiencia = null;

        // Función principal que trae los datos y dibuja
        async function cargarEstadisticas() {
            try {
                // 1. Construir la URL con filtros de fecha
                let url = 'http://localhost:8000/estadisticas';
                const fInicio = document.getElementById('fechaInicio').value;
                const fFin = document.getElementById('fechaFin').value;
                
                if (fInicio && fFin) {
                    url += `?fecha_inicio=${fInicio}&fecha_fin=${fFin}`;
                }

                // 2. Llamada a la API
                const respuesta = await fetch(url);
                const datos = await respuesta.json();

                // --- DIBUJAR GRÁFICO 1: PACIENTES ---
                const ctxPacientes = document.getElementById('graficoPacientes').getContext('2d');
                if (chartPacientes) chartPacientes.destroy();
                chartPacientes = new Chart(ctxPacientes, {
                    type: 'bar',
                    data: {
                        labels: datos.turnos.map(t => t.ubicacion),
                        datasets: [
                            { label: 'Atendidos', data: datos.turnos.map(t => t.total), backgroundColor: '#36A2EB' },
                            { label: 'En Espera', data: datos.turnos.map(t => t.esperando), backgroundColor: '#FFCE56' }
                        ]
                    },
                    options: { responsive: true, maintainAspectRatio: false }
                });

                // --- DIBUJAR GRÁFICO 2: SATISFACCIÓN ---
                const ctxSatisfaccion = document.getElementById('graficoSatisfaccion').getContext('2d');
                if (chartSatisfaccion) chartSatisfaccion.destroy();
                chartSatisfaccion = new Chart(ctxSatisfaccion, {
                    type: 'line',
                    data: {
                        labels: datos.satisfaccion.map(v => `${v.ubicacion} (${v.votos}v)`),
                        datasets: [{
                            label: 'Estrellas', 
                            data: datos.satisfaccion.map(v => v.promedio), 
                            backgroundColor: 'rgba(75, 192, 192, 0.2)', 
                            borderColor: '#4BC0C0', 
                            borderWidth: 2, 
                            fill: true,
                            tension: 0.3
                        }]
                    },
                    options: { 
                        responsive: true, 
                        maintainAspectRatio: false, 
                        scales: { y: { min: 0, max: 5 } } 
                    }
                });

                // --- DIBUJAR GRÁFICO 3: EFICIENCIA (APILADO) ---
                const ctxEficiencia = document.getElementById('graficoEficiencia').getContext('2d');
                if (chartEficiencia) chartEficiencia.destroy();
                chartEficiencia = new Chart(ctxEficiencia, {
                    type: 'bar',
                    data: {
                        labels: datos.eficiencia.map(e => e.sucursal),
                        datasets: [
                            {
                                label: 'Espera (Min)', 
                                data: datos.eficiencia.map(e => e.espera),
                                backgroundColor: '#FF9800', 
                                borderRadius: 4
                            },
                            {
                                label: 'Atención (Min)', 
                                data: datos.eficiencia.map(e => e.atencion),
                                backgroundColor: '#9c27b0', 
                                borderRadius: 4
                            }
                        ]
                    },
                    options: { 
                        indexAxis: 'y', 
                        responsive: true, 
                        maintainAspectRatio: false,
                        scales: {
                            x: { stacked: true }, 
                            y: { stacked: true }
                        },
                        plugins: { legend: { display: true } }
                    }
                });

            } catch (error) {
                console.error("Error al cargar las estadísticas:", error);
            }
        }

        // --- FUNCIONES DE FILTROS RÁPIDOS ---

        function filtrarHoy() {
            // Obtenemos la fecha actual en la zona horaria del usuario
            const hoy = new Date();
            const yyyy = hoy.getFullYear();
            const mm = String(hoy.getMonth() + 1).padStart(2, '0');
            const dd = String(hoy.getDate()).padStart(2, '0');
            
            const fechaFormateada = `${yyyy}-${mm}-${dd}`;
            
            // Asignamos el valor corregido a los inputs
            document.getElementById('fechaInicio').value = fechaFormateada;
            document.getElementById('fechaFin').value = fechaFormateada;
            
            // Ejecutamos la consulta a la API
            cargarEstadisticas();
        }

        function filtrarTodo() {
            // Limpiamos los inputs para que la API traiga todo el histórico
            document.getElementById('fechaInicio').value = '';
            document.getElementById('fechaFin').value = '';
            cargarEstadisticas();
        }

        // Carga inicial al abrir la página
        window.onload = cargarEstadisticas;
    </script>
</body>
</html>
