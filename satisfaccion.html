<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plexus - Satisfacción</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0; padding: 0; display: flex; justify-content: center; align-items: center;
            height: 100vh; background: linear-gradient(180deg, #001f4d 0%, #0675AE 100%);
            font-family: 'Montserrat', sans-serif; overflow: hidden; color: white; text-align: center;
        }

        .main-container { width: 100%; max-width: 900px; padding: 20px; }
        .title { color: #ffff00; font-size: 3.2rem; margin-bottom: 10px; }
        .subtitle { font-size: 1.4rem; margin-bottom: 40px; font-weight: 400; opacity: 0.9; }

        .caritas-container { display: flex; justify-content: center; gap: 25px; }

        .carita-btn {
            background: rgba(255, 255, 255, 0.08);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 25px;
            padding: 30px 20px;
            font-size: 5.5rem;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            flex: 1;
            display: flex; flex-direction: column; align-items: center; gap: 15px;
            color: white; outline: none;
        }

        /* Etiquetas debajo de las caritas */
        .carita-label { font-size: 1.2rem; font-weight: 600; letter-spacing: 1px; }

        /* Efectos individuales por tipo */
        .btn-bad:hover { background: rgba(255, 82, 82, 0.2); border-color: #ff5252; transform: scale(1.08); }
        .btn-neutral:hover { background: rgba(255, 193, 7, 0.2); border-color: #ffc107; transform: scale(1.08); }
        .btn-good:hover { background: rgba(76, 175, 80, 0.2); border-color: #4caf50; transform: scale(1.08); }

        /* Feedback y Otros */
        #pantalla-gracias, #pantalla-feedback { display: none; flex-direction: column; align-items: center; justify-content: center; }
        #pantalla-encuesta { display: flex; flex-direction: column; align-items: center; }

        textarea {
            width: 100%; max-width: 550px; padding: 20px; border-radius: 15px; 
            font-size: 1.3rem; border: none; margin-bottom: 25px; font-family: inherit;
        }

        .btn-enviar { background: #28a745; color: white; border: none; padding: 18px 40px; border-radius: 12px; font-size: 1.3rem; font-weight: bold; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .btn-omitir { background: transparent; color: white; border: 1px solid white; padding: 18px 40px; border-radius: 12px; font-size: 1.3rem; cursor: pointer; margin-left: 10px; }

        .plexus-logo { color: white; font-size: 1.8rem; font-weight: 700; position: absolute; bottom: 30px; letter-spacing: 3px; opacity: 0.6; }
    </style>
</head>
<body>

    <div class="main-container">
        <div id="pantalla-encuesta">
            <h1 class="title">¿Cómo fue tu experiencia hoy?</h1>
            <h2 class="subtitle">Tu opinión es fundamental para brindarte un mejor servicio.</h2>

            <div class="caritas-container">
                <button class="carita-btn btn-bad" onclick="enviarVoto(1)">
                    🙁 <span class="carita-label">INSATISFECHO</span>
                </button>

                <button class="carita-btn btn-neutral" onclick="enviarVoto(3)">
                    😐 <span class="carita-label">REGULAR</span>
                </button>

                <button class="carita-btn btn-good" onclick="enviarVoto(5)">
                    😊 <span class="carita-label">EXCELENTE</span>
                </button>
            </div>
        </div>

        <div id="pantalla-feedback">
            <h1 class="title" style="font-size: 2.8rem;">¿Podemos mejorar en algo?</h1>
            <p style="font-size: 1.3rem; margin-bottom: 25px;">Tu comentario nos ayuda a crecer.</p>
            
            <textarea id="textoComentario" rows="4" placeholder="Escribe aquí tu sugerencia..."></textarea>
            
            <div>
                <button class="btn-enviar" onclick="enviarVotoFinal()">ENVIAR</button>
                <button class="btn-omitir" onclick="saltarFeedback()">OMITIR</button>
            </div>
        </div>

        <div id="pantalla-gracias">
            <span style="font-size: 6rem; margin-bottom: 20px;">✨</span>
            <h1 class="title">¡Muchas gracias!</h1>
            <h2 class="subtitle">Valoramos mucho tu tiempo y preferencia.</h2>
        </div>
    </div>

    <div class="plexus-logo">PLEXUS</div>

    <script>
        const parametrosURL = new URLSearchParams(window.location.search);
        const ciudadConfigurada = parametrosURL.get('ciudad');
        const sucursalConfigurada = parametrosURL.get('sucursal');

        if (!ciudadConfigurada || !sucursalConfigurada) {
            alert("⚠️ Error de configuración en la tablet.");
        }

        let votoTemporal = 0;

        function enviarVoto(puntajeSeleccionado) {
            votoTemporal = puntajeSeleccionado;
            if (puntajeSeleccionado === 5) {
                enviarVotoFinal();
            } else {
                document.getElementById('pantalla-encuesta').style.display = 'none';
                document.getElementById('pantalla-feedback').style.display = 'flex';
            }
        }

        function saltarFeedback() {
            if(document.getElementById('textoComentario')) document.getElementById('textoComentario').value = "";
            enviarVotoFinal();
        }

        async function enviarVotoFinal() {
            const comentarioIngresado = document.getElementById('textoComentario') ? document.getElementById('textoComentario').value : "";
            const datos = { 
                ciudad: ciudadConfigurada,
                sucursal: sucursalConfigurada,
                puntaje: votoTemporal,
                comentario: comentarioIngresado
            };

            try {
                const respuesta = await fetch('http://192.168.100.19:8000/votar', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(datos)
                });

                if (respuesta.ok) {
                    document.getElementById('pantalla-encuesta').style.display = 'none';
                    document.getElementById('pantalla-feedback').style.display = 'none';
                    document.getElementById('pantalla-gracias').style.display = 'flex';

                    setTimeout(() => {
                        document.getElementById('pantalla-gracias').style.display = 'none';
                        document.getElementById('pantalla-encuesta').style.display = 'flex';
                        if (document.getElementById('textoComentario')) document.getElementById('textoComentario').value = '';
                    }, 3000); 
                }
            } catch (error) {
                console.error("Error de conexión:", error);
            }
        }
    </script>
</body>
</html>
