<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plexus - Satisfacción</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* --- ESTILOS VISUALES GENERALES --- */
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            /* Fondo azul oscuro corporativo alineado con recepción */
            background: linear-gradient(135deg, #001f4d 0%, #004b87 100%);
            font-family: 'Montserrat', sans-serif;
            color: white;
            text-align: center;
        }

        .main-container { 
            width: 90%; 
            max-width: 900px; 
            padding: 30px; 
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* --- LOGO --- */
        .plexus-logo { 
            margin-bottom: 20px;
            margin-top: 20px;
        }
        .plexus-logo img {
            height: 60px;
            width: auto;
            object-fit: contain;
        }

        /* --- TÍTULOS --- */
        .title { 
            font-size: 3rem; 
            font-weight: 600;
            margin: 0 0 10px 0; 
        }
        .highlight { 
            color: #c4d600; /* Verde/Amarillo institucional */
        }
        .subtitle { 
            font-size: 1.3rem; 
            font-weight: 400; 
            margin-bottom: 40px; 
            opacity: 0.9; 
        }

        /* --- BOTONES DE VOTACIÓN (ESTILO TARJETA) --- */
        .caritas-container { 
            display: flex; 
            justify-content: center; 
            gap: 20px; 
            width: 100%;
            max-width: 800px;
        }

        .carita-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 12px;
            padding: 40px 20px;
            cursor: pointer;
            transition: all 0.2s ease;
            flex: 1;
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            gap: 20px;
            color: white; 
            outline: none;
            user-select: none;
        }

        .carita-btn:hover, .carita-btn:active { 
            background: rgba(255, 255, 255, 0.15); 
            transform: scale(0.95); /* Efecto táctil de hundimiento */
            border-color: #c4d600;
        }

        /* Círculo blanco para el icono */
        .icon-circle-white {
            width: 80px; 
            height: 80px; 
            background: white; 
            border-radius: 50%;
            display: flex; 
            justify-content: center; 
            align-items: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        /* Iconos SVG */
        .icon-circle-white svg { 
            width: 40px; 
            height: 40px; 
            fill: #004b87; /* Azul corporativo */
        }

        .carita-label { 
            font-size: 1.2rem; 
            font-weight: 600; 
            letter-spacing: 1px; 
        }

        /* --- PANTALLAS OCULTAS (Feedback y Gracias) --- */
        #pantalla-gracias, #pantalla-feedback { 
            display: none; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            width: 100%;
        }
        #pantalla-encuesta { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            width: 100%;
        }

        /* Formulario de Feedback */
        textarea {
            width: 100%; 
            max-width: 600px; 
            padding: 20px; 
            border-radius: 15px; 
            font-size: 1.2rem; 
            border: none; 
            margin-bottom: 25px; 
            font-family: inherit;
            outline: none;
            resize: none;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        textarea:focus {
            box-shadow: 0 0 0 3px #c4d600;
        }

        .botones-feedback {
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        .btn-enviar { 
            background: #c4d600; 
            color: #001f4d; 
            border: none; 
            padding: 15px 40px; 
            border-radius: 50px; 
            font-size: 1.2rem; 
            font-weight: 700; 
            cursor: pointer; 
            transition: transform 0.2s;
        }
        .btn-enviar:active { transform: scale(0.95); }

        .btn-omitir { 
            background: transparent; 
            color: white; 
            border: 1px solid white; 
            padding: 15px 40px; 
            border-radius: 50px; 
            font-size: 1.2rem; 
            font-weight: 600;
            cursor: pointer; 
            transition: background 0.2s;
        }
        .btn-omitir:active { background: rgba(255,255,255,0.1); transform: scale(0.95); }

        /* Mensaje de Gracias */
        .icono-gracias svg {
            width: 100px;
            height: 100px;
            fill: #c4d600;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

    <div class="main-container">
        
        <div class="plexus-logo">
            <img src="LogoPlexus.png" alt="Plexus Medicina Diagnóstica">
        </div>

        <div id="pantalla-encuesta">
            <h1 class="title">¿Cómo fue tu <span class="highlight">experiencia</span> hoy?</h1>
            <h2 class="subtitle">Tu opinión es fundamental para brindarte un mejor servicio.</h2>

            <div class="caritas-container">
                <button class="carita-btn" onclick="enviarVoto(1)">
                    <div class="icon-circle-white">
                        <svg viewBox="0 0 24 24"><path d="M15 3H6c-.83 0-1.54.5-1.84 1.22l-3.02 7.05c-.09.23-.14.47-.14.73v2c0 1.1.9 2 2 2h6.31l-.95 4.57-.03.32c0 .41.17.79.44 1.06L9.83 23l6.59-6.59c.36-.36.58-.86.58-1.41V5c0-1.1-.9-2-2-2zm4 0v12h4V3h-4z"/></svg>
                    </div>
                    <span class="carita-label">INSATISFECHO</span>
                </button>

                <button class="carita-btn" onclick="enviarVoto(3)">
                    <div class="icon-circle-white">
                        <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm5 11H7v-2h10v2z"/></svg>
                    </div>
                    <span class="carita-label">REGULAR</span>
                </button>

                <button class="carita-btn" onclick="enviarVoto(5)">
                    <div class="icon-circle-white">
                        <svg viewBox="0 0 24 24"><path d="M1 21h4V9H1v12zm22-11c0-1.1-.9-2-2-2h-6.31l.95-4.57.03-.32c0-.41-.17-.79-.44-1.06L14.17 1 7.59 7.59C7.22 7.95 7 8.45 7 9v10c0 1.1.9 2 2 2h9c.83 0 1.54-.5 1.84-1.22l3.02-7.05c.09-.23.14-.47.14-.73v-2z"/></svg>
                    </div>
                    <span class="carita-label">EXCELENTE</span>
                </button>
            </div>
        </div>

        <div id="pantalla-feedback">
            <h1 class="title">¿Podemos <span class="highlight">mejorar</span> en algo?</h1>
            <p class="subtitle" style="margin-bottom: 25px;">Tu comentario nos ayuda a crecer.</p>
            
            <textarea id="textoComentario" rows="4" placeholder="Escribe aquí tu sugerencia..."></textarea>
            
            <div class="botones-feedback">
                <button class="btn-enviar" onclick="enviarVotoFinal()">ENVIAR</button>
                <button class="btn-omitir" onclick="saltarFeedback()">OMITIR</button>
            </div>
        </div>

        <div id="pantalla-gracias">
            <div class="icono-gracias">
                <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>
            </div>
            <h1 class="title">¡Muchas <span class="highlight">gracias!</span></h1>
            <h2 class="subtitle">Valoramos mucho tu tiempo y preferencia.</h2>
        </div>

    </div>

    <script>
        const parametrosURL = new URLSearchParams(window.location.search);
        const ciudadConfigurada = parametrosURL.get('ciudad');
        const sucursalConfigurada = parametrosURL.get('sucursal');

        if (!ciudadConfigurada || !sucursalConfigurada) {
            alert("⚠️ Error de configuración en la tablet.\nPor favor contacte a sistemas.");
        }

        let votoTemporal = 0;

        function enviarVoto(puntajeSeleccionado) {
            votoTemporal = puntajeSeleccionado;
            // Si el voto es 5 (Excelente), salta directo al final
            if (puntajeSeleccionado === 5) {
                enviarVotoFinal();
            } else {
                // Si es menor a 5, pide feedback
                document.getElementById('pantalla-encuesta').style.display = 'none';
                document.getElementById('pantalla-feedback').style.display = 'flex';
            }
        }

        function saltarFeedback() {
            if(document.getElementById('textoComentario')) {
                document.getElementById('textoComentario').value = "";
            }
            enviarVotoFinal();
        }

        async function enviarVotoFinal() {
            const comentarioIngresado = document.getElementById('textoComentario') ? document.getElementById('textoComentario').value : "";
            const datos = { 
                ciudad: ciudadConfigurada,
                sucursal: sucursalConfigurada,
                puntaje: votoTemporal,
                comentario: comentarioIngresado
            };

            try {
                // TU IP Y RUTA EXACTAS
                const respuesta = await fetch('http://192.168.100.19:8000/votar', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(datos)
                });

                if (respuesta.ok) {
                    document.getElementById('pantalla-encuesta').style.display = 'none';
                    document.getElementById('pantalla-feedback').style.display = 'none';
                    document.getElementById('pantalla-gracias').style.display = 'flex';

                    setTimeout(() => {
                        document.getElementById('pantalla-gracias').style.display = 'none';
                        document.getElementById('pantalla-encuesta').style.display = 'flex';
                        if (document.getElementById('textoComentario')) {
                            document.getElementById('textoComentario').value = '';
                        }
                    }, 4000); // Se queda 4 segundos en la pantalla de gracias
                }
            } catch (error) {
                console.error("Error de conexión:", error);
            }
        }
    </script>
</body>
</html>
